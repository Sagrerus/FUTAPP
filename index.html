<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FUT COIN</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f2f2f2;
}

.app{
    max-width:430px;
    margin:auto;
    min-height:100vh;
    background:white;
    overflow:hidden;
    position:relative;
}

.header{
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    border-bottom:1px solid #ddd;
    background:white;
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:30px;
    font-weight:bold;
    color:#00c853;
}

.clock{
    color:#666;
    font-size:18px;
    font-weight:bold;
}

.page{
    display:none;
    padding:20px;
    padding-bottom:110px;
}

.page.active{
    display:block;
}

.section-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
    color:#111;
}

.match-card{
    background:white;
    border-radius:24px;
    padding:20px;
    margin-bottom:18px;
    border:1px solid #ddd;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.league{
    color:#00c853;
    font-size:13px;
    font-weight:bold;
    margin-bottom:15px;
}

.match-content{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.team{
    width:35%;
    text-align:center;
}

.team img{
    width:65px;
    height:65px;
    object-fit:contain;
    margin-bottom:10px;
}

.team-name{
    font-size:14px;
    font-weight:bold;
}

.vs{
    font-size:22px;
    font-weight:bold;
    color:#777;
}

.match-time{
    text-align:center;
    margin-top:15px;
    color:#666;
    font-size:15px;
}

.table{
    background:white;
    border-radius:20px;
    overflow:hidden;
    border:1px solid #ddd;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.table-header{
    background:#00c853;
    color:white;
    display:flex;
    justify-content:space-between;
    padding:15px;
    font-weight:bold;
}

.table-row{
    display:flex;
    justify-content:space-between;
    padding:15px;
    border-top:1px solid #eee;
}

.store-img{
    width:150px;
    border-radius:20px;
    margin-bottom:15px;
}

.price{
    color:#00c853;
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    max-width:430px;
    background:white;
    border-top:1px solid #ddd;
    display:flex;
    justify-content:space-around;
    padding:15px 0;
}

.nav-item{
    color:#777;
    font-size:12px;
    cursor:pointer;
    text-align:center;
}

.nav-item.active{
    color:#00c853;
    font-weight:bold;
}

/* JUEGO */

#goalGame{
    width:100%;
    height:320px;
    background:linear-gradient(to bottom,#4caf50,#2e7d32);
    border-radius:20px;
    position:relative;
    overflow:hidden;
    margin-top:20px;
}

#goalkeeper{
    width:80px;
    height:80px;
    background:red;
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    border-radius:10px;
    transition:0.3s;
}

#ball{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:55px;
    cursor:pointer;
    transition:0.5s;
}

.buy-btn{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:15px;
    background:#00c853;
    color:white;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

</style>

</head>
<body>

    < div class="app">

        
</body>
